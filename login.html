<!DOCTYPE html>
<html lang="en">
<head>

<!-- Google tag (gtag.js) -->

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rising Progress – Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />

<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: rgba(255,255,255,0.20);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        width: 360px;
        height: auto;
        background: white;
        border-radius: 14px;
        padding: 32px;
        box-shadow: 0px 12px 32px rgba(0,0,0,0.10);
        animation: fadeIn 0.5s ease;
        border-top: 8px solid #2563eb;
        text-align: center;
        position: relative;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .close-btn {
        position: absolute;
        top: 8px;
        right: 12px;
        font-size: 20px;
        cursor: pointer;
        color: #9ca3af;
        transition: 0.2s;
    }
    .close-btn:hover {
        color: #4b5563;
    }

    .logo {
        width: 180px;
        margin: 0 auto 10px;
        display: block;
    }

    .subtitle {
        font-size: 15px;
        color: #374151;
        margin-bottom: 24px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 16px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 15px;
        box-sizing: border-box;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn-login {
        background: #2563eb;
        color: white;
    }
    .btn-login:hover { background: #1e4fc2; }

    .btn-signup {
        background: #ea580c;
        color: white;
        margin-top: 8px;
    }
    .btn-signup:hover { background: #c94a0a; }

    .status {
        margin-top: 14px;
        min-height: 20px;
        font-size: 14px;
        color: #374151;
    }

    .status.error {
        color: #b91c1c;
    }

    .status.success {
        color: #166534;
    }

    .terms {
        margin-top: 18px;
        text-align: center;
        font-size: 13px;
        color: #374151;
    }

    .terms a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
    }
    .terms a:hover { text-decoration: underline; }
</style>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import {
        getAuth,
        isSignInWithEmailLink,
        signInWithEmailLink,
        setPersistence,
        browserSessionPersistence
    } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import {
        getFunctions,
        httpsCallable
    } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-functions.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDai5gpX1x9I3uaF4MI7WAzq2oItLRPoZA",
        authDomain: "rising-progress.firebaseapp.com",
        projectId: "rising-progress",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const functions = getFunctions(app, "us-central1");

    function getRedirectTarget() {
        const params = new URLSearchParams(window.location.search);
        const target = params.get("redirect") || "progress.html";
        return target;
    }

    function setStatus(message, type = "") {
        const el = document.getElementById("status");
        el.textContent = message || "";
        el.className = "status" + (type ? " " + type : "");
    }

    async function ensureSessionPersistence() {
        await setPersistence(auth, browserSessionPersistence);
    }

    async function completeEmailLinkSignIn() {
        if (!isSignInWithEmailLink(auth, window.location.href)) return;

        await ensureSessionPersistence();

        let email = window.localStorage.getItem("emailForSignIn");
        if (!email) {
            email = window.prompt("Please confirm your email address to finish signing in:");
        }

        if (!email) {
            setStatus("Email confirmation is required to finish sign-in.", "error");
            return;
        }

        try {
            setStatus("Signing you in...");
            await signInWithEmailLink(auth, email, window.location.href);
            window.localStorage.removeItem("emailForSignIn");
            window.location.href = getRedirectTarget();
        } catch (err) {
            console.error(err);
            setStatus(err.message || "Unable to complete sign-in.", "error");
        }
    }

    window.login = async function () {
        const email = document.getElementById("email").value.trim().toLowerCase();
        if (!email) {
            setStatus("Enter your email address.", "error");
            return;
        }

        try {
            await ensureSessionPersistence();

            setStatus("Sending sign-in link...");
            const sendApprovedUserSignInLink = httpsCallable(functions, "sendApprovedUserSignInLink");
            const result = await sendApprovedUserSignInLink({
                email,
                redirect: getRedirectTarget()
            });

            window.localStorage.setItem("emailForSignIn", email);
            setStatus(
                result?.data?.message || "If your account is approved, you will receive an email shortly.",
                "success"
            );
        } catch (err) {
            console.error(err);
            setStatus(err.message || "Unable to start sign-in.", "error");
        }
    };

    window.addEventListener("DOMContentLoaded", () => {
        completeEmailLinkSignIn();
    });
</script>

</head>

<body>

    <div class="card" id="loginCard">
        <div class="close-btn" onclick="window.location.href='progress.html'">×</div>

        <img src="risingprogress.png" class="logo" alt="Rising Progress Logo">

        <div class="subtitle">Login to use all premium features</div>

        <input id="email" type="email" placeholder="Email" autocomplete="email" />
        <button class="btn btn-login" onclick="login()">Email Me a Secure Sign-In Link</button>

        <div id="status" class="status"></div>

        <button class="btn btn-signup"
        onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScWccu5cvg6SR4HL2eFDzZF-4q-81zK7VPBIXekUgkJSpGl_Q/viewform?usp=header', '_blank', 'noopener,noreferrer')">
        Request Account ↗
        </button>

        <div class="terms">
            By logging in, you accept the <a href="terms.html" target="_blank">Terms & Conditions</a>.
        </div>
    </div>
</body>
</html>
