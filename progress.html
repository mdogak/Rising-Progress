<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Progress</title>
</head>
<body>
  <!-- content -->
  <script type="module">
    import { loadFromUrlParams } from './js/url.js';
    import { loadFromCsvText } from './js/csv.js';

    (async function () {
      const loaded = await loadFromUrlParams();
      if (!loaded) return;

      if (loaded.ext === "csv") {
        loadFromCsvText(loaded.text);
        return;
      }
      if (loaded.ext === "json") {
        // applyProjectModel is in url.js
        applyProjectModel(JSON.parse(loaded.text));
        return;
      }
    })();
  </script>
</body>
</html>
